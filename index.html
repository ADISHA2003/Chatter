<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter</title>
    <link rel="icon" type="image/png" href="chatter(1).png">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">

        <p>Email: <a href="mailto:adityasharma56697@gmail.com">adityasharma56697@gmail.com</a></p>

    <header class="header">
        <button id="sidebar-open-btn" class="sidebar-open-btn"><i class="fas fa-bars"></i></button>
    </header>

    <!-- Main content -->
    <div class="chat-container" id="chat-container">
        <img class="logo" src="Chatter.png" alt="Logo" id="logo">
        <div class="chat-box" id="chat-box">
        </div>     
        <input type="text" id="user-input" placeholder="Type your message...">
    </div>

    <!-- Buttons container -->
    <div class="button-container">
        <button id="send-btn" onclick="sendMessage()">Send</button>
        <button id="search-btn" onclick="search()">Search</button>
    </div>

    <footer class="footer">Chatter can make mistakes</footer>
