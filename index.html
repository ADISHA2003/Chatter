<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter</title>
    <link rel="icon" type="image/png" href="chatter(1).png">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header class="header">
        <button id="about-btn" class="about-btn"><i class="fas fa-info-circle"></i></button>
        <strong></strong>
        <button id="aboutbot-btn" class="aboutbot-btn"><i class="fas fa-info-circle"></i></button>
    </header>
    
    <div class="chat-container" id="chat-container">
                <img class="logo" src="https://botchatter.vercel.app/Chatter.png" alt="Logo" id="logo">
        <div id="floating-window">
    <div id="close-button">&times;</div>
    <div id="content">
      <h2>How to Use Our Chatbot</h2>
      <p>Here are some instructions on how to use our chatbot...</p>
    </div>
  </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="keyword-box-container">
            <div class="keyword-box" id="keyword-box"></div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-btn" onclick="sendMessage()">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54240.png" alt="Send Icon">
            </button>
            <button id="search-btn" onclick="search()">
                <img src="https://pluspng.com/img-png/search-button-png-search-button-512.png" alt="Search Icon">
            </button>
        </div>
    </div>
    <footer class="footer">
    Chatter can make mistakes.
    </footer>

    <script src="script.js"></script>
</body>
</html>
