<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter</title>
    <link rel="icon" type="image/png" href="chatter(1).png">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header class="header">
        <button id="about-btn" class="about-btn"><i class="fas fa-info-circle"></i></button>

    <h3>Model-1.0</h3>
    </header>

    <div class="chat-container" id="chat-container">
        <img class="logo" src="Chatter.png" alt="Logo" id="logo">
        <div class="chat-box" id="chat-box"></div>     
        <input type="text" id="user-input" placeholder="Type your message...">
    </div>

    <div class="button-container">
        <button id="send-btn" onclick="sendMessage()">
            <img src="https://cdn1.iconfinder.com/data/icons/materia-arrows-symbols-vol-6/24/018_272_arrow_up_upload-512.png" alt="Send Icon">
        </button>
        <button id="search-btn" onclick="search()">
            <img src="https://www.svgrepo.com/show/507852/search-circle.svg" alt="Search Icon">
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
