<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter</title>
    <link rel="icon" type="image/png" href="chatter(1).png">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header class="header">
        <a href="#" class="sidebar-toggle"></a>
            <img src="sidebar.svg" alt="Sidebar Icon" class="sidebar-icon">
        </a>
        <div class="loading-wave-container">
            <div class="loading-wave">
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
              <div class="loading-bar"></div>
            </div>
          </div>                    
    </header>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="container">
                <div class="query-container">
                <input type="query" id="searchQuery" placeholder="AI powered search...">
                <button id="searchButton">Search</button>
                </div>
                <div id="search-box"></div>
                <div id="searchResults"></div>
                <div id="loading" class="hidden">Loading...</div>
            </div>
        </div>
    </div>    
    <div class="chat-container" id="chat-container">
        <div class="chat-box" id="chat-box"></div>
        <div class="keyword-box-container">
            <div class="keyword-box" id="keyword-box"></div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Send Message...">
            <button id="send-btn" onclick="sendMessage()">
                <img src="send.png" alt="Send Icon">
            </button>
            <button id="msg-btn" onclick="sendMsg()">
                <img src="gemini.png" alt="gemini Icon">
            </button>
            <button id="search-btn" onclick="search()">
                <img src="search.png" alt="Search Icon">
            </button>
        </div>
    </div>
    
    <footer>
        Consider checking important information <a href="about.html" style="color: deepskyblue; text-decoration: none">here</a>.
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
